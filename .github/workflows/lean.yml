name: Continuous Mathematical Verification Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Run Lean 4 Theorem Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Local Repository Source
      uses: actions/checkout@v4

    - name: Initialize Lean 4 Environment Toolchain
      uses: leanprover/lean-action@v1
      with:
        lean-version: 'leanprover/lean4:v4.31.0-rc2'

    - name: Hydrate Precompiled Mathematical Cache
      run: |
        lake exe cache get

    - name: Execute Lean Project Audit
      run: |
        lake clean
        lake build
